# iWarehouse Messenger — PRODUCTION reverse proxy with TLS
# Used by docker-compose.prod.yml. Certificates come from Let's Encrypt via
# certbot on the host, mounted read-only at /etc/letsencrypt.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Port 80: serve ACME challenges (certificate issuance/renewal) and redirect
# everything else to HTTPS.
server {
    listen 80;
    server_name chat.iwarehouse.ph;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name chat.iwarehouse.ph;

    ssl_certificate     /etc/letsencrypt/live/chat.iwarehouse.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.iwarehouse.ph/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 200m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # REST API
    location /api/ {
        proxy_pass         http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    # Socket.IO realtime
    location /socket.io/ {
        proxy_pass         http://api:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Next.js web app
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
